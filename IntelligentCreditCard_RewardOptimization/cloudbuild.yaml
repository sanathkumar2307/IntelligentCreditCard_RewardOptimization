steps:
  # Step 1: Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ${_APP_DIR}/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - ${_APP_DIR}

  # Step 2: Push the image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_IMAGE_TAG}

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region
      - ${_REGION}
      - --service-account
      - ${_RUNTIME_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-secrets
      - OPENAI_API_KEY=${_OPENAI_SECRET}:latest
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_IMAGE_TAG}

substitutions:
  _APP_DIR: IntelligentCreditCard_RewardOptimization
  _SERVICE_NAME: streamlit-app
  _REGION: us-central1
  _REPO_NAME: my-streamlit-repo
  _IMAGE_TAG: latest
  _RUNTIME_SA_NAME: cloud-run-rag-sa
  _OPENAI_SECRET: OPENAI_API_KEY

options:
  logging: CLOUD_LOGGING_ONLY